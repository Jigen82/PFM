name: Sync Fork with Upstream (Keep Local Dockerfile)

on:
  schedule:
    - cron: "0 2 * * *"   # ogni giorno alle 02:00
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/UrloMythus/UnHided.git || true

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream/main into main (keep local changes on conflict)
        run: |
          git checkout main
          git merge -X ours upstream/main --no-edit || exit 1

      - name: Push changes
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
